name: Deploy backend to Heroku (container)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - "worker/**"
      - "ml/**"
      - "backend/Dockerfile"
      - "backend/start.sh"
      - ".github/workflows/deploy-heroku-backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login to Heroku Registry
        uses: docker/login-action@v3
        with:
          registry: registry.heroku.com
          username: _
          password: ${{ secrets.HEROKU_API_KEY }}

      - name: Build image (classic docker)
        run: |
          docker build -t registry.heroku.com/$HEROKU_APP_NAME/web -f backend/Dockerfile .

      - name: Push image (classic docker)
        run: |
          docker push registry.heroku.com/$HEROKU_APP_NAME/web

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install-ubuntu.sh | sh

      - name: Release on Heroku
        run: heroku container:release web -a $HEROKU_APP_NAME
