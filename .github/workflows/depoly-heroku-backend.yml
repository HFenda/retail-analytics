name: Deploy backend to Heroku (container)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - "worker/**"
      - "ml/**"
      - "backend/Dockerfile"
      - "backend/start.sh"
      - ".github/workflows/deploy-heroku-backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login to Heroku Registry
        uses: docker/login-action@v3
        with:
          registry: registry.heroku.com
          username: _
          password: ${{ secrets.HEROKU_API_KEY }}

      - name: Build & Push (linux/amd64, no provenance)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: registry.heroku.com/${{ env.HEROKU_APP_NAME }}/web
          provenance: false
          sbom: false

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install-ubuntu.sh | sh

      - name: Heroku auth check
        run: heroku auth:whoami || heroku auth:token > /dev/null

      - name: Release on Heroku
        run: heroku container:release web -a $HEROKU_APP_NAME
